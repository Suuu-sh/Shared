name: TestFlight Deploy
description: Build an iOS archive, upload it to TestFlight, and optionally distribute it to internal testers.
inputs:
  project-path:
    description: Path to the .xcodeproj file.
    required: true
  scheme:
    description: Xcode scheme.
    required: true
  configuration:
    description: Xcode build configuration.
    required: false
    default: Release
  app-bundle-id:
    description: App bundle identifier.
    required: true
  team-id:
    description: Apple Developer team ID.
    required: true
  xcode-version:
    description: Xcode version passed to setup-xcode.
    required: false
    default: latest-stable
  build-number:
    description: Optional build number. If omitted, JST timestamp is used.
    required: false
    default: ''
  app-store-connect-key-id:
    description: App Store Connect API key ID.
    required: true
  app-store-connect-issuer-id:
    description: App Store Connect issuer ID.
    required: true
  app-store-connect-private-key:
    description: App Store Connect private key contents.
    required: true
  ios-distribution-certificate-p12-base64:
    description: Base64 encoded Apple Distribution certificate.
    required: true
  ios-distribution-certificate-password:
    description: Password for the distribution certificate.
    required: true
  ios-app-store-provisioning-profile-base64:
    description: Base64 encoded App Store provisioning profile.
    required: true
  testflight-internal-group-name:
    description: Internal TestFlight group name.
    required: false
    default: CI Internal
  testflight-internal-tester-emails:
    description: Comma separated internal tester emails.
    required: false
    default: ''
  testflight-notify-assigned-testers:
    description: Whether to send TestFlight notifications.
    required: false
    default: 'true'
  upload-failure-artifacts:
    description: Whether to upload archive/export artifacts when the deploy fails.
    required: false
    default: 'true'
  failure-artifact-name:
    description: Artifact name used when uploading failure logs.
    required: false
    default: testflight-deploy-logs
outputs:
  build-number:
    description: Generated or provided build number.
    value: ${{ steps.build-number.outputs.build-number }}
runs:
  using: composite
  steps:
    - name: Select Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: ${{ inputs.xcode-version }}

    - name: Validate required inputs
      shell: bash
      env:
        PROJECT_PATH_INPUT: ${{ inputs.project-path }}
        SCHEME: ${{ inputs.scheme }}
        APP_BUNDLE_ID: ${{ inputs.app-bundle-id }}
        TEAM_ID: ${{ inputs.team-id }}
        APP_STORE_CONNECT_KEY_ID: ${{ inputs.app-store-connect-key-id }}
        APP_STORE_CONNECT_ISSUER_ID: ${{ inputs.app-store-connect-issuer-id }}
        APP_STORE_CONNECT_PRIVATE_KEY: ${{ inputs.app-store-connect-private-key }}
        IOS_DISTRIBUTION_CERTIFICATE_P12_BASE64: ${{ inputs.ios-distribution-certificate-p12-base64 }}
        IOS_DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ inputs.ios-distribution-certificate-password }}
        IOS_APP_STORE_PROVISIONING_PROFILE_BASE64: ${{ inputs.ios-app-store-provisioning-profile-base64 }}
      run: |
        set -euo pipefail

        required_inputs=(
          PROJECT_PATH_INPUT
          SCHEME
          APP_BUNDLE_ID
          TEAM_ID
          APP_STORE_CONNECT_KEY_ID
          APP_STORE_CONNECT_ISSUER_ID
          APP_STORE_CONNECT_PRIVATE_KEY
          IOS_DISTRIBUTION_CERTIFICATE_P12_BASE64
          IOS_DISTRIBUTION_CERTIFICATE_PASSWORD
          IOS_APP_STORE_PROVISIONING_PROFILE_BASE64
        )

        for name in "${required_inputs[@]}"; do
          if [ -z "${!name}" ]; then
            echo "$name input is required."
            exit 1
          fi
        done

    - name: Resolve paths
      shell: bash
      env:
        PROJECT_PATH_INPUT: ${{ inputs.project-path }}
        SCHEME: ${{ inputs.scheme }}
      run: |
        set -euo pipefail

        resolve_path() {
          case "$1" in
            /*) printf '%s\n' "$1" ;;
            *) printf '%s\n' "$GITHUB_WORKSPACE/$1" ;;
          esac
        }

        PROJECT_PATH="$(resolve_path "$PROJECT_PATH_INPUT")"
        ARCHIVE_PATH="$RUNNER_TEMP/${SCHEME}.xcarchive"
        EXPORT_PATH="$RUNNER_TEMP/${SCHEME}Export"
        EXPORT_OPTIONS_PLIST="$RUNNER_TEMP/${SCHEME}ExportOptions.plist"
        KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

        {
          echo "PROJECT_PATH=$PROJECT_PATH"
          echo "ARCHIVE_PATH=$ARCHIVE_PATH"
          echo "EXPORT_PATH=$EXPORT_PATH"
          echo "EXPORT_OPTIONS_PLIST=$EXPORT_OPTIONS_PLIST"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH"
        } >> "$GITHUB_ENV"

    - name: Show selected Xcode
      shell: bash
      run: |
        set -euo pipefail
        xcodebuild -version
        xcodebuild -list -project "$PROJECT_PATH"

    - name: Create App Store Connect API key file
      shell: bash
      env:
        APP_STORE_CONNECT_KEY_ID: ${{ inputs.app-store-connect-key-id }}
        APP_STORE_CONNECT_PRIVATE_KEY: ${{ inputs.app-store-connect-private-key }}
      run: |
        set -euo pipefail
        KEY_PATH="$RUNNER_TEMP/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"
        printf '%s' "$APP_STORE_CONNECT_PRIVATE_KEY" > "$KEY_PATH"
        chmod 600 "$KEY_PATH"
        echo "APP_STORE_CONNECT_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"

    - name: Install signing assets
      shell: bash
      env:
        IOS_DISTRIBUTION_CERTIFICATE_P12_BASE64: ${{ inputs.ios-distribution-certificate-p12-base64 }}
        IOS_DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ inputs.ios-distribution-certificate-password }}
        IOS_APP_STORE_PROVISIONING_PROFILE_BASE64: ${{ inputs.ios-app-store-provisioning-profile-base64 }}
        TEAM_ID: ${{ inputs.team-id }}
        APP_BUNDLE_ID: ${{ inputs.app-bundle-id }}
      run: |
        set -euo pipefail

        CERT_PATH="$RUNNER_TEMP/ios_distribution_certificate.p12"
        PROFILE_PATH="$RUNNER_TEMP/ios_app_store.mobileprovision"
        PROFILE_PLIST="$RUNNER_TEMP/ios_app_store_profile.plist"
        KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"

        printf '%s' "$IOS_DISTRIBUTION_CERTIFICATE_P12_BASE64" | base64 -D > "$CERT_PATH"
        printf '%s' "$IOS_APP_STORE_PROVISIONING_PROFILE_BASE64" | base64 -D > "$PROFILE_PATH"

        security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
        security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
        security import "$CERT_PATH" \
          -P "$IOS_DISTRIBUTION_CERTIFICATE_PASSWORD" \
          -A \
          -f pkcs12 \
          -k "$KEYCHAIN_PATH"
        security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

        EXISTING_KEYCHAINS=$(security list-keychains -d user | tr -d '"')
        security list-keychains -d user -s "$KEYCHAIN_PATH" $EXISTING_KEYCHAINS
        security default-keychain -d user -s "$KEYCHAIN_PATH"
        security find-identity -v -p codesigning "$KEYCHAIN_PATH"

        security cms -D -i "$PROFILE_PATH" > "$PROFILE_PLIST"
        PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" "$PROFILE_PLIST")
        PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" "$PROFILE_PLIST")
        PROFILE_TEAM_ID=$(/usr/libexec/PlistBuddy -c "Print :TeamIdentifier:0" "$PROFILE_PLIST")
        PROFILE_APP_IDENTIFIER=$(/usr/libexec/PlistBuddy -c "Print :Entitlements:application-identifier" "$PROFILE_PLIST")

        if [ "$PROFILE_TEAM_ID" != "$TEAM_ID" ]; then
          echo "Provisioning profile team ID $PROFILE_TEAM_ID does not match expected team $TEAM_ID."
          exit 1
        fi

        case "$PROFILE_APP_IDENTIFIER" in
          "$TEAM_ID.$APP_BUNDLE_ID"|"$TEAM_ID.*")
            ;;
          *)
            echo "Provisioning profile application identifier $PROFILE_APP_IDENTIFIER does not match $APP_BUNDLE_ID."
            exit 1
            ;;
        esac

        mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
        cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"

        {
          echo "PROVISIONING_PROFILE_UUID=$PROFILE_UUID"
          echo "PROVISIONING_PROFILE_NAME=$PROFILE_NAME"
        } >> "$GITHUB_ENV"

    - name: Generate build number and export options
      id: build-number
      shell: bash
      env:
        BUILD_NUMBER_INPUT: ${{ inputs.build-number }}
        APP_BUNDLE_ID: ${{ inputs.app-bundle-id }}
        TEAM_ID: ${{ inputs.team-id }}
      run: |
        set -euo pipefail

        BUILD_NUMBER="$BUILD_NUMBER_INPUT"
        if [ -z "$BUILD_NUMBER" ]; then
          BUILD_NUMBER="$(TZ=Asia/Tokyo date +%Y%m%d%H%M%S)"
        fi

        /usr/bin/python3 - <<'PY'
        import os
        import textwrap
        from pathlib import Path

        export_options_plist = Path(os.environ["EXPORT_OPTIONS_PLIST"])
        app_bundle_id = os.environ["APP_BUNDLE_ID"]
        provisioning_profile_name = os.environ["PROVISIONING_PROFILE_NAME"]
        team_id = os.environ["TEAM_ID"]

        export_options_plist.write_text(
            textwrap.dedent(
                f"""\
                <?xml version="1.0" encoding="UTF-8"?>
                <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
                <plist version="1.0">
                <dict>
                  <key>destination</key>
                  <string>upload</string>
                  <key>manageAppVersionAndBuildNumber</key>
                  <false/>
                  <key>method</key>
                  <string>app-store-connect</string>
                  <key>provisioningProfiles</key>
                  <dict>
                    <key>{app_bundle_id}</key>
                    <string>{provisioning_profile_name}</string>
                  </dict>
                  <key>signingCertificate</key>
                  <string>Apple Distribution</string>
                  <key>signingStyle</key>
                  <string>manual</string>
                  <key>teamID</key>
                  <string>{team_id}</string>
                  <key>uploadBitcode</key>
                  <false/>
                  <key>uploadSymbols</key>
                  <true/>
                </dict>
                </plist>
                """
            ),
            encoding="utf-8",
        )
        PY

        echo "BUILD_NUMBER=$BUILD_NUMBER" >> "$GITHUB_ENV"
        echo "build-number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
        plutil -p "$EXPORT_OPTIONS_PLIST"

    - name: Archive release build
      shell: bash
      env:
        SCHEME: ${{ inputs.scheme }}
        CONFIGURATION: ${{ inputs.configuration }}
        TEAM_ID: ${{ inputs.team-id }}
        APP_BUNDLE_ID: ${{ inputs.app-bundle-id }}
      run: |
        set -euo pipefail
        rm -rf "$ARCHIVE_PATH" "$EXPORT_PATH"
        xcodebuild \
          -project "$PROJECT_PATH" \
          -scheme "$SCHEME" \
          -configuration "$CONFIGURATION" \
          -archivePath "$ARCHIVE_PATH" \
          -destination 'generic/platform=iOS' \
          DEVELOPMENT_TEAM="$TEAM_ID" \
          OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH" \
          CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
          archive

    - name: Upload to TestFlight
      shell: bash
      env:
        APP_STORE_CONNECT_KEY_ID: ${{ inputs.app-store-connect-key-id }}
        APP_STORE_CONNECT_ISSUER_ID: ${{ inputs.app-store-connect-issuer-id }}
      run: |
        set -euo pipefail
        xcodebuild \
          -exportArchive \
          -archivePath "$ARCHIVE_PATH" \
          -exportPath "$EXPORT_PATH" \
          -exportOptionsPlist "$EXPORT_OPTIONS_PLIST" \
          -authenticationKeyPath "$APP_STORE_CONNECT_KEY_PATH" \
          -authenticationKeyID "$APP_STORE_CONNECT_KEY_ID" \
          -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID"

    - name: Ensure internal tester distribution
      shell: bash
      env:
        ACTION_ROOT: ${{ github.action_path }}
        ASC_KEY_ID: ${{ inputs.app-store-connect-key-id }}
        ASC_ISSUER_ID: ${{ inputs.app-store-connect-issuer-id }}
        TESTFLIGHT_INTERNAL_GROUP_NAME: ${{ inputs.testflight-internal-group-name }}
        TESTFLIGHT_INTERNAL_TESTER_EMAILS: ${{ inputs.testflight-internal-tester-emails }}
        TESTFLIGHT_NOTIFY_ASSIGNED_TESTERS: ${{ inputs.testflight-notify-assigned-testers }}
        APP_BUNDLE_ID: ${{ inputs.app-bundle-id }}
      run: |
        set -euo pipefail
        export ASC_PRIVATE_KEY_PATH="$APP_STORE_CONNECT_KEY_PATH"
        ruby "$ACTION_ROOT/../../scripts/ensure_testflight_internal_distribution.rb" \
          --bundle-id "$APP_BUNDLE_ID" \
          --build-number "$BUILD_NUMBER"

    - name: Upload export artifacts on failure
      if: ${{ failure() && inputs.upload-failure-artifacts == 'true' }}
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.failure-artifact-name }}
        path: |
          ${{ env.EXPORT_PATH }}
          ${{ env.ARCHIVE_PATH }}
        if-no-files-found: ignore
