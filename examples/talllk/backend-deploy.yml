name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Migrate and Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate required secrets
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::Missing secret DATABASE_URL."
            exit 1
          fi
          if [ -z "$FLY_API_TOKEN" ]; then
            echo "::error::Missing secret FLY_API_TOKEN."
            exit 1
          fi
          if [ -z "$SENTRY_AUTH_TOKEN" ]; then
            echo "::error::Missing secret SENTRY_AUTH_TOKEN."
            exit 1
          fi

      - name: Apply SQL migrations
        uses: <OWNER>/<SHARED_REPO>/actions/postgres-migrate@main
        with:
          database-url: ${{ secrets.DATABASE_URL }}
          migrations-dir: sql/migrations

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --remote-only

      - name: Resolve Sentry issues
        uses: <OWNER>/<SHARED_REPO>/actions/sentry-resolve@main
        with:
          sentry-auth-token: ${{ secrets.SENTRY_AUTH_TOKEN }}
          org: suu-hb
          note-dir: .codex/sentry-fix
