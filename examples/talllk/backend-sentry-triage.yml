name: Sentry Fix Prep

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sentry-fix
  cancel-in-progress: false

jobs:
  triage:
    name: Fetch Sentry issues and open fix PRs
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout backend repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run Sentry fix automation
        uses: <OWNER>/<SHARED_REPO>/actions/sentry-triage@main
        with:
          github-token: ${{ github.token }}
          sentry-auth-token: ${{ secrets.SENTRY_AUTH_TOKEN }}
          org: suu-hb
          project: go
          base-branch: main
          time-range: 24h
          environment: production
          limit: '3'
          branch-prefix: sentry/fix
          note-dir: .codex/sentry-fix
