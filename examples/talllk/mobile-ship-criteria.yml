name: Ship Criteria (Flutter analyze + test)

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ship-criteria-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mobile_flutter_analyze:
    name: Mobile / flutter analyze
    runs-on: ubuntu-latest

    steps:
      - name: Checkout mobile repository
        uses: actions/checkout@v5

      - name: Run flutter analyze
        uses: <OWNER>/<SHARED_REPO>/actions/flutter-analyze@main

  mobile_flutter_test:
    name: Mobile / flutter test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout mobile repository
        uses: actions/checkout@v5

      - name: Run flutter test
        uses: <OWNER>/<SHARED_REPO>/actions/flutter-test@main

  release_gate:
    name: Ship criteria summary (all required checks green)
    runs-on: ubuntu-latest
    needs: [mobile_flutter_analyze, mobile_flutter_test]
    if: ${{ always() }}

    steps:
      - name: Verify all required checks are green
        run: |
          if [[ "${{ needs.mobile_flutter_analyze.result }}" != "success" ]]; then
            echo "mobile_flutter_analyze failed: ${{ needs.mobile_flutter_analyze.result }}"
            exit 1
          fi
          if [[ "${{ needs.mobile_flutter_test.result }}" != "success" ]]; then
            echo "mobile_flutter_test failed: ${{ needs.mobile_flutter_test.result }}"
            exit 1
          fi
          echo "All ship criteria checks passed."
